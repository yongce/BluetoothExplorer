apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply from: "${androidModuleCommon}"

project.archivesBaseName = 'ble-common'

android {
    namespace "me.ycdev.android.bluetooth.common"

    defaultConfig {
        minSdkVersion 23
    }
}

dependencies {
    implementation deps.kotlin.stdlib

    testImplementation deps.test.core
    testImplementation deps.test.junit
    testImplementation deps.test.truth
    testImplementation deps.test.mockk
    testImplementation deps.test.robolectric

    // AndroidJUnitRunner and JUnit Rules
    androidTestImplementation deps.test.runner
    androidTestImplementation deps.test.rules
    // Espresso dependencies
    androidTestImplementation deps.test.espressoCore
}

project.ext {
    moduleName = 'me.ycdev.android.ble-common'
    moduleDesc = 'BLE common library for Android'
}

if (bintrayUploadEnabled) {
    apply from: rootProject.file('bintray-install.gradle')
    apply from: rootProject.file('bintray-upload.gradle')
}
